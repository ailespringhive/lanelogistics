<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Container -->
  <rect x="10" y="25" width="40" height="25" rx="2" fill="#ef3139"/>
  <line x1="20" y1="25" x2="20" y2="50" stroke="#d42a31" stroke-width="1.5"/>
  <line x1="30" y1="25" x2="30" y2="50" stroke="#d42a31" stroke-width="1.5"/>
  <line x1="40" y1="25" x2="40" y2="50" stroke="#d42a31" stroke-width="1.5"/>
  <!-- Train tracks -->
  <rect x="0" y="55" width="80" height="4" rx="1" fill="#555"/>
  <rect x="5" y="52" width="3" height="10" fill="#888"/>
  <rect x="15" y="52" width="3" height="10" fill="#888"/>
  <rect x="25" y="52" width="3" height="10" fill="#888"/>
  <rect x="35" y="52" width="3" height="10" fill="#888"/>
  <rect x="45" y="52" width="3" height="10" fill="#888"/>
  <rect x="55" y="52" width="3" height="10" fill="#888"/>
  <rect x="65" y="52" width="3" height="10" fill="#888"/>
  <rect x="75" y="52" width="3" height="10" fill="#888"/>
  <!-- Wheels -->
  <circle cx="18" cy="52" r="4" fill="#222d39"/>
  <circle cx="42" cy="52" r="4" fill="#222d39"/>
  <!-- Ship/Globe indicating intermodal -->
  <circle cx="63" cy="33" r="12" fill="none" stroke="#222d39" stroke-width="2"/>
  <ellipse cx="63" cy="33" rx="6" ry="12" fill="none" stroke="#222d39" stroke-width="1"/>
  <line x1="51" y1="33" x2="75" y2="33" stroke="#222d39" stroke-width="1"/>
  <line x1="63" y1="21" x2="63" y2="45" stroke="#222d39" stroke-width="1"/>
</svg>
